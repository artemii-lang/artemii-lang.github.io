<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h2>🔧 Тест WebApp</h2>
    <button onclick="sendTest()" style="padding: 20px; font-size: 20px;">
        📤 Отправить тестовые данные
    </button>
    
    <script>
        const tg = Telegram.WebApp;
        tg.ready();
        
        function sendTest() {
            const testData = {
                test: "hello",
                timestamp: Date.now(),
                hex: "#ff0000"
            };
            
            console.log("Отправка:", testData);
            tg.sendData(JSON.stringify(testData));
            tg.close();
        }
    </script>
</body>
</html>
