<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Color Picker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
    <style>
        body {
            margin: 0;
            padding: 16px;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        #picker {
            width: 100%;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div id="picker"></div>

    <script>
        // Создаем Color Picker
        const colorPicker = new iro.ColorPicker('#picker', {
            width: Math.round(document.documentElement.clientWidth * 0.9),
            color: "#ff0000",
            borderWidth: 1,
            borderColor: "#fff",
        });

        // Изменяем фон при выборе цвета
        colorPicker.on('color:change', function(color) {
            document.body.style.backgroundColor = color.hexString;
        });

        // Настройка кнопки в Telegram
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        Telegram.WebApp.MainButton.setText('✅ Выбрать цвет').show();
        Telegram.WebApp.MainButton.onClick(function() {
            const data = JSON.stringify({
                hex: colorPicker.color.hexString,
                rgb: colorPicker.color.rgb
            });
            
            Telegram.WebApp.sendData(data);
            console.log(data)
            Telegram.WebApp.close();
        });
    </script>
</body>
</html>
